{% extends 'gestion/core/base.html' %}
{% load static %}

{% block content %}

<div class="container-fluid" style="max-width: 600px;">
    
    <div class="card shadow-lg mt-5 border-0">
        <div class="card-header bg-primary text-white py-3">
            <h5 class="mb-0 fw-bold">
                ✏️ Editar Tasa: {{ nombre }}
                {% if modelo == 'afp' %}(AFP){% else %}(Salud){% endif %}
            </h5>
        </div>
        <div class="card-body p-4">
            <p class="text-muted mb-4">Ingresa el nuevo porcentaje de descuento. <br><small>Ejemplo: Para 11.44%, escribe <strong>11.44</strong> o <strong>11,44</strong>.</small></p>

            <form method="POST">
                {% csrf_token %}
                
                <div class="mb-4">
                    <label class="form-label fw-bold">Porcentaje (%)</label>
                    <div class="input-group input-group-lg">
                        <input type="text" 
                               name="tasa" 
                               class="form-control fw-bold text-center" 
                               value="{{ tasa_actual }}" 
                               required>
                        <span class="input-group-text">%</span>
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <a href="{% url 'parametros_remuneraciones' %}" class="btn btn-secondary">
                        Cancelar
                    </a>
                    <button type="submit" class="btn btn-primary">
                        💾 Guardar Cambio
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
